<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EAV Glass — The Artwork</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .artwork-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
      padding: 3rem 5rem 4rem;
    }
    .artwork-item img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      display: block;
      margin-bottom: 1rem;
    }
    .artwork-item .artwork-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 400;
      margin-bottom: 0.2rem;
    }
    .artwork-item .artwork-meta {
      font-size: 0.72rem;
      color: var(--warm-gray);
      letter-spacing: 0.08em;
    }
    .artwork-item .artwork-price {
      font-size: 0.78rem;
      color: var(--rust);
      margin-top: 0.4rem;
    }
    @media (max-width: 768px) {
      .artwork-grid { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <button id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div id="nav-overlay"></div>

  <nav id="sidebar">

      <h1>EAV Glass</h1>
      <span>Handcrafted Originals</span>
    </div>
    <ul>
      <li><a href="../index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="artwork.html">The Artwork</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="workspace.html">The Workspace</a></li>
      <li><a href="custom-orders.html">Custom Orders</a></li>
    </ul>
    <div class="nav-footer">&copy; 2025 EAV Glass</div>
  </nav>

  <main>
    <div class="page-hero">
      <p class="eyebrow">Collection</p>
      <h2>The <em>Artwork</em></h2>
    </div>

    <div class="artwork-grid">

      <div class="artwork-item">
        <img src="../assets/images/EAVmarbleblackbackgrounbs.jpg" alt="EAV Glass Marble Piece" />
        <p class="artwork-title">Nebula Marble Series No. 1 </p>
        <p class="artwork-meta">Handcrafted Glass · One of a Kind</p>
        <p class="artwork-price">Contact for pricing</p>
      </div>
