    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0e1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      animation: gridScroll 20s linear infinite;
    }

    @keyframes gridScroll {
      0% { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    .vault-container {
      background: #111827;
      border: 1px solid #1e2d45;
      border-radius: 12px;
      padding: 3rem 3.5rem;
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 60px rgba(0,212,255,0.05);
    }

    .vault-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .vault-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      display: block;
      animation: flicker 4s infinite;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.4; }
      97% { opacity: 1; }
      98% { opacity: 0.2; }
      99% { opacity: 1; }
    }

    .vault-title {
      font-size: 1.1rem;
      color: #00d4ff;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .vault-sub {
      font-size: 0.7rem;
      color: #2a4a6a;
      letter-spacing: 2px;
    }

    .terminal-line {
      font-size: 0.72rem;
      color: #2a5a3a;
      margin-bottom: 1.5rem;
      line-height: 1.8;
    }

    .terminal-line span {
      color: #00ff88;
    }

    label {
      display: block;
      font-size: 0.68rem;
      color: #4a6a80;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 1.5rem;
    }

    input[type="password"] {
      width: 100%;
      background: #080c14;
      border: 1px solid #1e2d45;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
      color: #00d4ff;
      letter-spacing: 4px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="password"]:focus {
      border-color: #00d4ff;
      box-shadow: 0 0 0 2px rgba(0,212,255,0.1);
    }

    input[type="password"].error {
      border-color: #ff3b3b;
      box-shadow: 0 0 0 2px rgba(255,59,59,0.1);
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .btn-unlock {
      width: 100%;
      padding: 0.85rem;
      background: transparent;
      border: 1px solid #00d4ff;
      border-radius: 6px;
      color: #00d4ff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.82rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-unlock:hover {
      background: rgba(0,212,255,0.08);
      box-shadow: 0 0 20px rgba(0,212,255,0.15);
    }

    .btn-unlock:active {
      transform: scale(0.98);
    }

    .error-msg {
      display: none;
      font-size: 0.68rem;
      color: #ff6b6b;
      letter-spacing: 1px;
      margin-top: 0.75rem;
      text-align: center;
    }

    .error-msg.visible { display: block; }

    .hint {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #1e2d45;
      font-size: 0.62rem;
      color: #1a3a4a;
      text-align: center;
      letter-spacing: 1px;
      line-height: 1.8;
    }

    .hint a {
      color: #1a4a5a;
      text-decoration: none;
    }

    /* Unlocked state — hides vault shows content */
    #vault-screen { display: flex; flex-direction: column; }
    #content-screen { display: none; width: 100vw; height: 100vh; }
    #content-screen iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    body.unlocked {
      display: block;
      overflow: auto;
    }

    body.unlocked #vault-screen { display: none; }
    body.unlocked #content-screen { display: block; }

  </style>
</head>
<body>

  <div id="vault-screen">
    <div class="vault-container">
      <div class="vault-header">
        <span class="vault-icon">🔒</span>
        <div class="vault-title">Access Restricted</div>
        <div class="vault-sub">// EAV GLASS — PRIVATE VAULT //</div>
      </div>

      <div class="terminal-line">
        > SECURE ZONE DETECTED<br>
        > AUTHENTICATION REQUIRED<br>
        > <span>HINT: CHECK THE SOURCE</span>
      </div>

      <label for="passInput">Enter Access Key</label>
      <div class="input-wrap">
        <input type="password" id="passInput" placeholder="••••••••••" autocomplete="off" />
      </div>

      <button class="btn-unlock" onclick="attemptUnlock()">[ UNLOCK ]</button>

      <div class="error-msg" id="errorMsg">
        &gt; ACCESS DENIED — INCORRECT KEY
      </div>

      <div class="hint">
        // not all doors are meant to be opened //<br>
        // but nerds find a way //<br><br>
        <a href="../index.html">← return to eavglass.com</a>
      </div>
    </div>
  </div>

  <div id="content-screen">
    <iframe src="esp32-soundboard.html" title="EAV Vault Content"></iframe>
  </div>

  <script>
    // ============================================================
    // If you're reading this — nice work.
    // The key is exactly what it says on the tin.
    // ALLONELOVE
    // ============================================================

    // Encoded so it's not completely obvious on a casual glance
    // but obvious to anyone who knows what base64 is
    const _k = atob("QUxMT05FTE9WRQ=="); // base64: ALLONELOVE

    document.getElementById('passInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') attemptUnlock();
    });

    function attemptUnlock() {
      const input = document.getElementById('passInput').value.toUpperCase().trim();
      const field = document.getElementById('passInput');
      const err = document.getElementById('errorMsg');

      if (input === _k) {
        document.body.classList.add('unlocked');
      } else {
        field.classList.add('error');
        err.classList.add('visible');
        setTimeout(() => field.classList.remove('error'), 400);
        field.value = '';
        field.focus();
      }
    }
  </script>

</body>
